<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder — FitnessGym</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-caja">
    <a href="index.html" class="logo" style="display:block;margin-bottom:1.5rem;">FITNESS<span>GYM</span></a>
    <h2>Accede a tu cuenta</h2>
    <p>Introduce tus datos para continuar</p>

    <form class="formulario" action="#" method="post">
      <div class="campo">
        <label for="usuario">Email o DNI</label>
        <input type="text" id="usuario" name="usuario" placeholder="tuemail@ejemplo.com" required>
      </div>
      <div class="campo">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn" style="margin-top:.5rem;">Entrar</button>
    </form>

    <p style="margin-top:1.5rem;font-size:.85rem;color:var(--suave);">
      ¿No tienes cuenta? <a href="contacto.html" style="color:var(--acento);">Contáctanos</a>
    </p>
  </div>
</div>

</body>
</html>
